      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#00e676"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00e676"/>
