 document.getElementById("root").innerHTML='<div style="font-family:DM Mono,monospace;color:#e6edf3;text-align:center;padding:60px 20px"><div style="font-family:Outfit,sans-serif;font-weight:900;font-size:42px">WORLDCUP<span style="color:#00d4ff">X</span></div><p style="color:#ff6b35;margin-top:16px">Data failed to load. Please refresh.</p></div>';

const GROUP_COLORS = {A:"#00d4ff",B:"#00e676",C:"#ffd600",D:"#ff6b35",E:"#b388ff",F:"#ff4444",G:"#4dd0e1",H:"#aeea00",I:"#ffab40",J:"#f06292",K:"#80cbc4",L:"#c0885a"};
// short display names so the ticker never collides ("South" for both Koreas/Africa)
const ABBR={"South Korea":"S. Korea","South Africa":"S. Africa","United States":"USA","New Zealand":"N. Zealand","Saudi Arabia":"Saudi Arabia","Bosnia and Herzegovina":"Bosnia","DR Congo":"DR Congo","Cape Verde":"Cape Verde","Ivory Coast":"Ivory Coast"};
const short=t=>ABBR[t]||t;
const FLAGS = {"Czechia":"🇨🇿","Mexico":"🇲🇽","South Africa":"🇿🇦","South Korea":"🇰🇷","Bosnia and Herzegovina":"🇧🇦","Canada":"🇨🇦","Qatar":"🇶🇦","Switzerland":"🇨🇭","Brazil":"🇧🇷","Haiti":"🇭🇹","Morocco":"🇲🇦","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Australia":"🇦🇺","Paraguay":"🇵🇾","Turkey":"🇹🇷","United States":"🇺🇸","Curacao":"🇨🇼","Ecuador":"🇪🇨","Germany":"🇩🇪","Ivory Coast":"🇨🇮","Japan":"🇯🇵","Netherlands":"🇳🇱","Sweden":"🇸🇪","Tunisia":"🇹🇳","Belgium":"🇧🇪","Egypt":"🇪🇬","Iran":"🇮🇷","New Zealand":"🇳🇿","Cape Verde":"🇨🇻","Saudi Arabia":"🇸🇦","Spain":"🇪🇸","Uruguay":"🇺🇾","France":"🇫🇷","Iraq":"🇮🇶","Norway":"🇳🇴","Senegal":"🇸🇳","Algeria":"🇩🇿","Argentina":"🇦🇷","Austria":"🇦🇹","Jordan":"🇯🇴","Colombia":"🇨🇴","DR Congo":"🇨🇩","Portugal":"🇵🇹","Uzbekistan":"🇺🇿","Croatia":"🇭🇷","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Ghana":"🇬🇭","Panama":"🇵🇦"};
const SYS_INFO = {
 PELE:["Nate Silver PELE International Ratings","T1 core model — raw rating values","natesilver.net"],
 ELO:["World Football Elo Ratings","T1 core model — raw rating values","eloratings.net"],
 FIFA:["FIFA Men's World Ranking (points)","T2 — raw rating values","inside.fifa.com"],
 LALAS:["Fox Sports — Alexi Lalas Power Rankings","T2 — ordinal 1-48","foxsports.com"],
 BR:["Bleacher Report Final 48-Team Power Ranking","T2 — ordinal 1-48","bleacherreport.com"],
 YAH:["Yahoo Sports Power Rankings 1-48","T2 — ordinal 1-48","sports.yahoo.com"],
 SPNET:["Sportsnet World Cup Power Rankings","T2 — ordinal 1-48","sportsnet.ca"],
 ATH:["The Athletic (NYT) — 48 Teams Ranked","T2 — ordinal 1-48","nytimes.com/athletic"],

};
const HILITE = 5; // rank-diff threshold for green/red outlier highlight (Chris's call)

// ---- live score overlay (client-side ESPN fetch; CORS-open) ----
const ESPN_ALIAS = {"korea republic":"South Korea","south korea":"South Korea","united states":"United States","usa":"United States","bosnia-herzegovina":"Bosnia and Herzegovina","bosnia and herzegovina":"Bosnia and Herzegovina","turkiye":"Turkey","türkiye":"Turkey","turkey":"Turkey","cote d'ivoire":"Ivory Coast","côte d'ivoire":"Ivory Coast","ivory coast":"Ivory Coast","czech republic":"Czechia","czechia":"Czechia","dr congo":"DR Congo","congo dr":"DR Congo","cabo verde":"Cape Verde","cape verde":"Cape Verde","curaçao":"Curacao","curacao":"Curacao","ir iran":"Iran","iran":"Iran"};
function canon(name){const n=(name||"").trim();if(FLAGS[n])return n;const a=ESPN_ALIAS[n.toLowerCase()];return a||n;}
function pairKey(a,b){return [a,b].sort().join("|");}
// build fixture lookup by unordered team pair
const FX_BY_PAIR={};WCX.fixtures.forEach(f=>{FX_BY_PAIR[pairKey(f.h,f.a)]=f;});
function useLive(){
 const [state,setState]=React.useState({ov:{},stale:false});
 React.useEffect(()=>{
  let alive=true,fails=0;
  const dates=[];const now=new Date();
  for(let i=-1;i<=1;i++){const d=new Date(now);d.setUTCDate(d.getUTCDate()+i);dates.push(""+d.getUTCFullYear()+String(d.getUTCMonth()+1).padStart(2,"0")+String(d.getUTCDate()).padStart(2,"0"));}
  async function pull(){
   try{
    const out={};let ok=false;
    for(const dt of dates){
     const r=await fetch("https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates="+dt);
     if(!r.ok)continue;const j=await r.json();ok=true;
     (j.events||[]).forEach(ev=>{
      const c=(ev.competitions||[])[0];if(!c)return;
      const st=(c.status||{}).type||{},cs=c.competitors||[];
      const hc=cs.find(x=>x.homeAway==="home"),ac=cs.find(x=>x.homeAway==="away");
      if(!hc||!ac)return;
      const h=canon(hc.team.displayName),a=canon(ac.team.displayName);
      const fx=FX_BY_PAIR[pairKey(h,a)];if(!fx)return;
      const hs=hc.score===""||hc.score==null?null:+hc.score, as_=ac.score===""||ac.score==null?null:+ac.score;
      if(st.state==="in"&&hs!=null){
       const al=(fx.h===h);
       out[fx.n]={hs:al?hs:as_,as:al?as_:hs,status:"LIVE",clock:st.shortDetail||st.detail||"LIVE"};
      } else if(st.state==="post"&&hs!=null){
       const al=(fx.h===h);
       out[fx.n]={hs:al?hs:as_,as:al?as_:hs,status:"FT",clock:""};
      }
     });
    }
    if(!alive)return;
    if(ok){fails=0;setState({ov:out,stale:false});}
    else {fails++;setState(s=>({ov:s.ov,stale:fails>=2}));}
   }catch(err){fails++;if(alive)setState(s=>({ov:s.ov,stale:fails>=2}));}
  }
  pull();const id=setInterval(pull,60000);
  return ()=>{alive=false;clearInterval(id);};
 },[]);
 return state;
}
function mergeLive(f,ov){const o=ov[f.n];return o?Object.assign({},f,o):f;}

// recompute standings + accuracy client-side from baked results + live overlay,
// so the site stays current for visitors even between server refreshes
function computeLive(ov){
 const groups={},xrm={};WCX.rows.forEach(r=>{groups[r.team]=r.group;xrm[r.team]=r.xr;});
 const stand={};Object.keys(WCX.standings).forEach(g=>{stand[g]={};WCX.standings[g].forEach(s=>{stand[g][s.team]={team:s.team,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});});
 // prediction-error accumulators: how close each model's projected margin was to actual.
 // X-Score is compared head-to-head with its component models (PELE, Elo) and the book.
 const errs={X:[],PELE:[],ELO:[],BOOK:[]};
 WCX.fixtures.map(f=>mergeLive(f,ov)).forEach(f=>{
  if(f.status!=="FT"||f.hs==null||f.as==null)return;
  const g=f.g;
  [[f.h,f.hs,f.as],[f.a,f.as,f.hs]].forEach(([t,gf,ga])=>{

 const sys=WCX.weighted.concat(WCX.compare);
 const fx=WCX.fixtures.filter(f=>f.h===team||f.a===team).map(f=>mergeLive(f,ov)).sort((a,b)=>a.n-b.n);
 const fmt=d=>{const dt=new Date(d.replace(" ","T"));return dt.toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})};
 const gc=GROUP_COLORS[r.group];
 const table=(standings&&standings[r.group])||[];
 return e("div",{className:"modalbg",onClick:close},
  e("div",{className:"modal",onClick:ev=>ev.stopPropagation()},
   e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}},
    e("div",null,
     e("div",{style:{fontFamily:"Outfit",fontWeight:800,fontSize:20,color:"#fff"}},e("span",{className:"flag"},FLAGS[team]||""),team),
     e("div",{style:{fontSize:11,color:"#8899aa",marginTop:3}},
      e("span",{style:{color:"#00d4ff",fontWeight:700}},"X#"+r.xr)," · X-Score ",e("span",{style:{color:"#00d4ff"}},r.x.toFixed(3))," · ",
      e("span",{className:"grp",style:{background:gc+"33",color:gc}},"GRP "+r.group))),
    e("button",{className:"keybtn",onClick:close},"CLOSE")),
   e("div",{className:"tm-sec"},"PER-SYSTEM RANK (best ",e("span",{style:{color:"#00e676"}},r.best)," · worst ",e("span",{style:{color:"#ff4444"}},r.worst),")"),
   e("div",{className:"tm-grid"},sys.map(s=>{
    const v=r.ranks[s],cls=WCX.tier[s]===1?"t1":WCX.tier[s]===2?"t2":"t3";
    return e("div",{className:"tm-cell",key:s},e("div",{className:"s "+cls},s),e("div",{className:"r "+cls},v==null?"—":v));
   })),
   e("div",{className:"tm-sec"},"GROUP "+r.group),
   table.map(s=>e("div",{className:"tm-fx",key:s.team,style:s.team===team?{background:"#121a25",borderRadius:4}:null},
    e("span",null,e("span",{className:"flag"},FLAGS[s.team]||""),e("span",{style:{color:s.team===team?"#fff":"#aab",fontWeight:s.team===team?700:400}},s.team)),
    e("span",{style:{color:"#8899aa",fontSize:11}},s.p+"P · "+(s.gd>0?"+":"")+s.gd+" GD · ",e("span",{className:"xs"},s.pts+"pts")))),
   e("div",{className:"tm-sec"},"FIXTURES"),
   fx.map(f=>{
    const home=f.h===team,opp=home?f.a:f.h;
    const tSpread=home?f.spread:-f.spread;
    const played=f.status==="FT"||f.status==="LIVE";
    let res=null;
    if(played){const ts=home?f.hs:f.as,os=home?f.as:f.hs;const wl=ts>os?"W":ts<os?"L":"D";res=e("span",{className:"tm-res tm-"+wl},ts+"–"+os+" "+wl);}
    const line=tSpread===0?"PK":(tSpread>0?"-":"+")+Math.abs(tSpread).toFixed(1);
    return e("div",{className:"tm-fx",key:f.n},
     e("span",null,e("span",{style:{color:"#566",fontSize:10,marginRight:7}},f.status==="LIVE"?(f.clock||"LIVE"):played?"FT":fmt(f.date)),
      e("span",{className:"flag"},FLAGS[opp]||""),e("span",{style:{color:"#fff"}},opp),e("span",{style:{color:"#566",fontSize:10}}," ("+(home?"H":"A")+")")),
     played?res:e("span",{style:{color:"#00d4ff",fontSize:11}},"X "+line));
   }),
   e("p",{style:{fontSize:10,color:"#566",marginTop:12}},"X-Score is the tier-weighted mean of this team's z-scores across the weighted systems. Fixture line is from "+team+"'s perspective.")));
}

function Results({ov,acc}){
 const fx=WCX.fixtures.map(f=>mergeLive(f,ov)).filter(f=>f.status==="FT"&&f.hs!=null).sort((a,b)=>b.n-a.n);
 if(!fx.length)return e("div",{style:{textAlign:"center",padding:40,color:"#8899aa"}},"No completed matches yet — projection accuracy appears here once games are played.");
 const fmtSp=v=>v==null?"–":(v>0?"+":"")+(+v).toFixed(1);
 const models=[["X-SCORE","X","#00d4ff"],["PELE","PELE","#c0885a"],["Elo","ELO","#c0885a"],["Book","BOOK","#8899aa"]];
 const ranked=models.filter(m=>acc[m[1]]&&acc[m[1]].mae!=null).sort((a,b)=>acc[a[1]].mae-acc[b[1]].mae);
 return e(React.Fragment,null,
  e("div",{style:{textAlign:"center",padding:"16px 16px 6px",color:"#8899aa",fontSize:11,letterSpacing:1}},
   "HOW CLOSE EACH MODEL'S PROJECTED MARGIN WAS TO THE ACTUAL RESULT · ",acc.n," MATCHES · LOWER = BETTER"),
  e("div",{className:"gwrap",style:{maxWidth:780}},ranked.map((m,i)=>e("div",{className:"gcard",key:m[1],style:{"--gc":m[2],textAlign:"center"}},
    e("div",{style:{fontFamily:"Outfit",fontWeight:800,fontSize:15,color:m[2]}},m[0],i===0?e("span",{className:"badge",style:{marginLeft:6}},"MOST ACCURATE"):null),
    e("div",{style:{fontSize:28,fontWeight:800,fontFamily:"Outfit",color:"#fff",marginTop:4}},acc[m[1]].mae),
    e("div",{style:{fontSize:10,color:"#8899aa"}},"avg goal error · median "+acc[m[1]].med))),
  ),
  e("div",{className:"twrap"},e("table",null,
   e("thead",null,e("tr",null,
    e("th",{style:{textAlign:"left"}},"MATCH"),e("th",null,"ACTUAL"),
    e("th",{style:{color:"#00d4ff"}},"X-SCORE"),e("th",{style:{color:"#c0885a"}},"PELE"),e("th",{style:{color:"#c0885a"}},"ELO"),e("th",{style:{color:"#8899aa"}},"BOOK"))),
   e("tbody",null,fx.map(f=>{
    const act=f.hs-f.as;
    const cands=[["X",f.proj&&f.proj.X],["PELE",f.proj&&f.proj.PELE],["ELO",f.proj&&f.proj.ELO],["BOOK",f.book&&f.book.spread]];
    let best=null,be=1e9;cands.forEach(([k,v])=>{if(v!=null&&Math.abs(v-act)<be){be=Math.abs(v-act);best=k;}});
    const cell=(k,v)=>e("td",{key:k,className:best===k?"hi-g":"",style:{fontWeight:best===k?700:400}},fmtSp(v));
    return e("tr",{key:f.n},
     e("td",{className:"teamcell"},e("span",{className:"flag"},FLAGS[f.h]||""),short(f.h)," ",e("b",{style:{color:"#ffd600"}},f.hs+"-"+f.as)," ",short(f.a),e("span",{className:"flag"},FLAGS[f.a]||"")),
     e("td",{style:{fontWeight:700,color:"#fff"}},fmtSp(act)),
     cell("X",f.proj&&f.proj.X),cell("PELE",f.proj&&f.proj.PELE),cell("ELO",f.proj&&f.proj.ELO),cell("BOOK",f.book&&f.book.spread));
   })))),
  e("p",{style:{textAlign:"center",fontSize:10,color:"#566",padding:"6px 16px 16px",maxWidth:680,margin:"0 auto",lineHeight:1.6}},
   "Each number is that model's projected goal margin for the home team; ACTUAL is the final margin. Green = the projection closest to the result. The X-Score is the composite of PELE + Elo; the book line is shown only as a market reference."));
}

function Methodology(){
 return e("div",{className:"meth"},
  e("h3",null,"01 — WHAT IS X-SCORE?"),
  e("p",null,"The X-Score is a ",e("strong",{style:{color:"#fff"}},"composite power rating")," that combines the two strongest international rating models — ",e("strong",{style:{color:"#fff"}},"Nate Silver's PELE and World Football Elo")," — into one number for all 48 teams. Same meta-model idea as BracketX (NCAA): blend the best models, then measure the blend against its parts."),
  e("h3",null,"02 — HOW IT'S BUILT"),
  e("p",null,"Each model's rating is z-scored across the 48-team field (so the two scales are comparable), and the X-Score is their average. The other ranking systems on the site (FIFA, Fox/Lalas, Bleacher, Yahoo, Sportsnet, The Athletic, The Ringer, USA TODAY) are shown as ",e("strong",{style:{color:"#8899aa"}},"reference columns only")," — they are not part of the X-Score."),
  e("div",{className:"formula"},"X-Score = ( z(PELE) + z(Elo) ) ÷ 2"),
  e("h3",null,"03 — X-SPREAD & WIN PROBABILITY"),
  e("p",null,"The X-Spread converts the X-Score difference into a projected goal margin (best-fit 0.74 goals per z-unit, calibrated against bookmaker lines), shown to the nearest half-goal. Win/Draw/Loss probabilities come from a twin-Poisson model built on that margin."),
  e("div",{className:"formula"},"X-Spread = ( X-Score A − X-Score B ) × 0.74 goals"),
  e("h3",null,"04 — MEASURING THE MODEL (RESULTS tab)"),
  e("p",null,"For every completed match we show the projected margin from the ",e("strong",{style:{color:"#00d4ff"}},"X-Score"),", from ",e("strong",{style:{color:"#fff"}},"PELE and Elo individually"),", and the ",e("strong",{style:{color:"#fff"}},"sportsbook line")," — next to the ",e("strong",{style:{color:"#fff"}},"actual result"),". We track each one's average error (MAE) to answer the real question: does the composite beat its component models? Exactly how BracketX compared X-Score to KenPom and BartTorvik. Scores update automatically from ESPN."),
  e("h3",null,"05 — DATA INTEGRITY"),
  e("p",null,"All values are real, fetched from source. Nothing is estimated. PELE and Elo both cover all 48 teams. Small early sample — the accuracy numbers will stabilize as the tournament goes on."),
  e("h3",null,"06 — WHAT'S NEXT"),
  e("p",null,"Knockout bracket and title probabilities as the group stage resolves."));
}

function App(){
 const tabs=[["RANKINGS","RANKINGS"],["STANDINGS","STANDINGS"],["GROUPS","GROUPS"],["MATCHUPS","MATCHUPS"],["RESULTS","RESULTS"],["FUTURES","FUTURES"],["METHODOLOGY","ABOUT"]];
 const SLUG={RANKINGS:"rankings",STANDINGS:"standings",GROUPS:"groups",MATCHUPS:"matchups",RESULTS:"results",FUTURES:"futures",METHODOLOGY:"about"};
 const fromHash=()=>{const s=(location.hash||"").replace("#","").toLowerCase();return Object.keys(SLUG).find(k=>SLUG[k]===s)||"RANKINGS";};
 const [tab,setTab]=React.useState(fromHash);
 React.useEffect(()=>{const on=()=>setTab(fromHash());window.addEventListener("hashchange",on);return ()=>window.removeEventListener("hashchange",on);},[]);
 const go=k=>{setTab(k);if(history.replaceState)history.replaceState(null,"","#"+SLUG[k]);else location.hash=SLUG[k];};
 const {ov,stale}=useLive();
 const {standings,acc}=React.useMemo(()=>computeLive(ov),[ov]);
 const [team,setTeam]=React.useState(null);
 return e(React.Fragment,null,
  e(Header,{acc,stale}),
  e(Ticker,{ov}),
  e(NextMatch,{ov}),
  e("div",{className:"tabwrap"},e("div",{className:"tabs"},tabs.map(([k,lbl])=>e("button",{key:k,className:"tab"+(tab===k?" on":""),onClick:()=>go(k)},lbl)))),
  tab==="RANKINGS"&&e(Rankings,{onTeam:setTeam}),
  tab==="STANDINGS"&&e(Standings,{standings,onTeam:setTeam}),
  tab==="GROUPS"&&e(Groups),
  tab==="MATCHUPS"&&e(Matchups,{ov}),
  tab==="RESULTS"&&e(Results,{ov,acc}),
  tab==="FUTURES"&&e(Futures),
  tab==="METHODOLOGY"&&e(Methodology),
  team&&e(TeamModal,{team,ov,standings,close:()=>setTeam(null)}),
  e("div",{className:"ftr"},
   e("div",{className:"logo"},"WORLDCUP",e("span",{className:"x"},"X")),
   e("div",{className:"who"},"CHRIS DELL: FOUNDER · SIBLING OF ",e("a",{href:"https://bracketx.co"},"BRACKETX.CO"))));
}
ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
