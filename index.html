<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldCupX — Composite Power Index</title>
<meta name="description" content="WorldCupX — World Cup 2026 national team composite power rankings. One consensus number from every major rating system.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#0d1117;color:#e6edf3;min-height:100vh}
  body{display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace}
  .wrap{text-align:center;padding:24px}
  .logo{font-family:'Outfit',sans-serif;font-weight:900;font-size:clamp(40px,9vw,84px);letter-spacing:1px;color:#fff}
  .logo .x{color:#00d4ff}
  .sub{color:#ffd600;font-size:clamp(11px,2.4vw,15px);letter-spacing:4px;margin-top:6px}
  .kick{color:#8899aa;font-size:12px;margin-top:28px;letter-spacing:1px}
  .pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:#00e676;margin-right:8px;animation:p 1.4s infinite}
  @keyframes p{0%,100%{opacity:1}50%{opacity:.25}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">WORLDCUP<span class="x">X</span></div>
  <div class="sub">COMPOSITE POWER INDEX</div>
  <div class="kick"><span class="pulse"></span>WORLD CUP 2026 · RANKINGS DROP BEFORE FIRST KICKOFF</div>
</div>
</body>
</html>
