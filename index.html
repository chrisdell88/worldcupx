<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldCupX — Composite Power Index</title>
<meta name="description" content="WorldCupX — World Cup 2026 national team composite power rankings. 10 ranking systems, z-score normalized into one consensus X-Score for all 48 teams.">
<meta property="og:title" content="WorldCupX — Composite Power Index">
<meta property="og:description" content="World Cup 2026 power rankings: 10 systems, one consensus number, all 48 teams.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="data.js"></script>
<style>
  html,body{margin:0;padding:0;background:#0d1117;color:#e6edf3;font-family:'DM Mono',monospace;-webkit-font-smoothing:antialiased}
  *{box-sizing:border-box}
  ::selection{background:#00d4ff44}
  a{color:#00d4ff;text-decoration:none}
  /* header pitch stripes */
  .hdr{position:relative;overflow:hidden;background:#0e1218;border-bottom:1px solid #1c2430;padding:26px 16px 18px;text-align:center}
  .hdr::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(0,230,118,.045) 0 70px,rgba(0,230,118,.012) 70px 140px);pointer-events:none}
  .hdr::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,#00e676,#00d4ff,#ffd600,#00e676);background-size:300% 100%;animation:slide 6s linear infinite}
  @keyframes slide{to{background-position:300% 0}}
  .logo{font-family:'Outfit',sans-serif;font-weight:900;font-size:clamp(34px,7vw,58px);letter-spacing:1px;color:#fff;line-height:1}
  .logo .x{color:#00d4ff}
  .sub{color:#ffd600;font-size:clamp(10px,2vw,13px);letter-spacing:5px;margin-top:6px}
  .kick{color:#8899aa;font-size:11px;margin-top:10px;letter-spacing:1px}
  .pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:#00e676;margin-right:7px;animation:p 1.4s infinite}
  @keyframes p{0%,100%{opacity:1}50%{opacity:.25}}
  .ball{position:absolute;bottom:6px;left:-30px;font-size:16px;animation:roll 14s linear infinite;opacity:.6}
  @keyframes roll{0%{left:-30px;transform:rotate(0)}100%{left:104%;transform:rotate(1440deg)}}
  /* tabs */
  .tabs{display:flex;gap:2px;justify-content:center;background:#0e1218;border-bottom:1px solid #1c2430;position:sticky;top:0;z-index:40;overflow-x:auto}
  .tab{background:none;border:none;color:#8899aa;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:2px;padding:13px 18px;cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap}
  .tab:hover{color:#cfe3ff}
  .tab.on{color:#00d4ff;border-bottom-color:#00d4ff}
  /* group pills */
  .pills{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:14px 10px 4px;background:#0d1117}
  .pill{border:1px solid #2a3545;background:#0e1218;color:#8899aa;border-radius:14px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;padding:4px 11px;cursor:pointer;transition:all .15s}
  .pill:hover{transform:translateY(-1px)}
  .pill.on{color:#0d1117;font-weight:700}
  /* table */
  .twrap{overflow-x:auto;padding:12px;background:#0d1117}
  table{border-collapse:collapse;margin:0 auto;background:#0e1218;border-left:3px solid #00d4ff;font-size:12px}
  th{position:sticky;top:0;background:#10161f;color:#8899aa;font-weight:500;font-size:9px;letter-spacing:1px;padding:8px 7px;text-align:center;border-bottom:1px solid #1c2430;cursor:help;white-space:nowrap}
  td{padding:6px 7px;text-align:center;border-bottom:1px solid #151c26;background:#0e1218;white-space:nowrap}
  tr{animation:rise .4s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  tr:hover td{background:#121a25}
  .xnum{color:#00d4ff;font-weight:700}
  .teamcell{text-align:left;min-width:170px;font-weight:500;color:#fff}
  .flag{margin-right:7px}
  .grp{display:inline-block;min-width:18px;border-radius:4px;font-size:10px;font-weight:700;padding:1px 5px}
  .xs{color:#00d4ff;font-weight:700}
  .best{color:#00e676}.worst{color:#ff4444}
  .t1{color:#00d4ff}.t2{color:#c0885a}.t3{color:#8899aa}
  .hi-g{background:rgba(0,230,118,.22)!important;border-radius:4px}
  .hi-r{background:rgba(255,68,68,.22)!important;border-radius:4px}
  .tip{position:relative}
  .tip .tiptext{visibility:hidden;position:absolute;top:115%;left:50%;transform:translateX(-50%);background:#1c2430;color:#e6edf3;font-size:10px;letter-spacing:.5px;padding:6px 9px;border-radius:5px;white-space:nowrap;z-index:60;border:1px solid #2a3545}
  .tip:hover .tiptext{visibility:visible}
  /* groups tab */
  .gwrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:14px;padding:16px;max-width:1240px;margin:0 auto}
  .gcard{background:#0e1218;border:1px solid #1c2430;border-top:3px solid var(--gc);border-radius:8px;padding:13px 14px;transition:transform .18s,box-shadow .18s;animation:rise .45s ease both}
  .gcard:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.5)}
  .ghead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
  .gname{font-family:'Outfit',sans-serif;font-weight:800;font-size:15px;color:var(--gc)}
  .gavg{font-size:10px;color:#8899aa}
  .grow{display:flex;justify-content:space-between;padding:5px 2px;border-bottom:1px solid #151c26;font-size:12px}
  .grow:last-child{border-bottom:none}
  .badge{font-size:9px;letter-spacing:1px;color:#0d1117;background:#ffd600;border-radius:3px;padding:1px 6px;font-weight:700;margin-left:7px;vertical-align:2px}
  /* results ticker */
  .ticker{background:#05080c;border-bottom:1px solid #1c2430;overflow:hidden;white-space:nowrap;position:relative}
  .ticker-track{display:inline-block;padding:7px 0;animation:tick 60s linear infinite}
  .ticker:hover .ticker-track{animation-play-state:paused}
  @keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .tk{display:inline-flex;align-items:center;gap:6px;margin:0 18px;font-size:12px;color:#cfd8e3}
  .tk b{color:#fff;font-weight:500}
  .tk .sc{color:#ffd600;font-weight:700;letter-spacing:.5px}
  .tk .live{color:#ff4444;font-weight:700;animation:p 1.4s infinite}
  .tk .ft{color:#566;font-size:9px;letter-spacing:1px;border:1px solid #2a3545;border-radius:3px;padding:0 4px}
  /* accuracy chip */
  .acc{display:inline-flex;align-items:center;gap:6px;background:#0e1218;border:1px solid #00e67655;border-radius:14px;padding:3px 11px;font-size:11px;color:#00e676;margin-top:10px}
  .acc b{color:#fff}
  /* live/ft badges on cards */
  .live-badge{font-size:9px;letter-spacing:1px;background:#ff4444;color:#fff;border-radius:3px;padding:1px 6px;font-weight:700;animation:p 1.4s infinite}
  .ft-badge{font-size:9px;letter-spacing:1px;background:#2a3545;color:#aab;border-radius:3px;padding:1px 6px;font-weight:700}
  .score{font-size:16px;font-weight:800;color:#ffd600;font-family:'Outfit',sans-serif}
  .hitmiss{font-size:9px;letter-spacing:1px;border-radius:3px;padding:1px 6px;font-weight:700;margin-left:7px}
  .hit{background:rgba(0,230,118,.2);color:#00e676}
  .miss{background:rgba(255,68,68,.2);color:#ff4444}
  .winflag{color:#00e676;margin-left:6px;font-weight:700}
  /* standings */
  .stand th{font-size:9px}
  .stand td{font-size:12px;padding:6px 8px}
  .qual{border-left:3px solid #00e676}
  .qual3{border-left:3px solid #ffd600}
  .out{border-left:3px solid #2a3545;opacity:.7}
  /* methodology */
  .meth{max-width:780px;margin:0 auto;padding:22px 18px;font-size:13px;line-height:1.75;color:#bcc8d4}
  .meth h3{font-family:'Outfit',sans-serif;font-size:14px;font-weight:800;color:#00d4ff;margin:26px 0 8px}
  .meth .formula{background:#161b22;border-radius:6px;padding:10px;font-size:12px;color:#00d4ff;text-align:center;margin:10px 0}
  .meth table{border-left:none;width:100%;font-size:11px}
  /* modal */
  .modalbg{position:fixed;inset:0;background:rgba(5,8,12,.82);z-index:90;display:flex;align-items:center;justify-content:center;padding:18px}
  .modal{background:#0e1218;border:1px solid #2a3545;border-radius:10px;max-width:680px;width:100%;max-height:84vh;overflow-y:auto;padding:20px}
  .keybtn{background:#10161f;color:#ffd600;border:1px solid #2a3545;border-radius:6px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;padding:6px 13px;cursor:pointer;transition:all .15s}
  .keybtn:hover{border-color:#ffd600}
  .ftr{background:#05080c;text-align:center;padding:26px 14px;margin-top:30px;border-top:1px solid #1c2430}
  .ftr .logo{font-size:22px}
  .ftr .who{color:#8899aa;font-size:10px;letter-spacing:2px;margin-top:6px}
  @media(max-width:640px){.tab{padding:11px 10px;font-size:10px;letter-spacing:1px}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const e = React.createElement;
const GROUP_COLORS = {A:"#00d4ff",B:"#00e676",C:"#ffd600",D:"#ff6b35",E:"#b388ff",F:"#ff4444",G:"#4dd0e1",H:"#aeea00",I:"#ffab40",J:"#f06292",K:"#80cbc4",L:"#c0885a"};
const FLAGS = {"Czechia":"🇨🇿","Mexico":"🇲🇽","South Africa":"🇿🇦","South Korea":"🇰🇷","Bosnia and Herzegovina":"🇧🇦","Canada":"🇨🇦","Qatar":"🇶🇦","Switzerland":"🇨🇭","Brazil":"🇧🇷","Haiti":"🇭🇹","Morocco":"🇲🇦","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Australia":"🇦🇺","Paraguay":"🇵🇾","Turkey":"🇹🇷","United States":"🇺🇸","Curacao":"🇨🇼","Ecuador":"🇪🇨","Germany":"🇩🇪","Ivory Coast":"🇨🇮","Japan":"🇯🇵","Netherlands":"🇳🇱","Sweden":"🇸🇪","Tunisia":"🇹🇳","Belgium":"🇧🇪","Egypt":"🇪🇬","Iran":"🇮🇷","New Zealand":"🇳🇿","Cape Verde":"🇨🇻","Saudi Arabia":"🇸🇦","Spain":"🇪🇸","Uruguay":"🇺🇾","France":"🇫🇷","Iraq":"🇮🇶","Norway":"🇳🇴","Senegal":"🇸🇳","Algeria":"🇩🇿","Argentina":"🇦🇷","Austria":"🇦🇹","Jordan":"🇯🇴","Colombia":"🇨🇴","DR Congo":"🇨🇩","Portugal":"🇵🇹","Uzbekistan":"🇺🇿","Croatia":"🇭🇷","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Ghana":"🇬🇭","Panama":"🇵🇦"};
const SYS_INFO = {
 PELE:["Nate Silver PELE International Ratings","T1 — raw rating values, z-scored","natesilver.net"],
 ELO:["World Football Elo Ratings","T1 — raw rating values, z-scored","eloratings.net"],
 FIFA:["FIFA Men's World Ranking (points)","T1 — raw rating values, z-scored","inside.fifa.com"],
 LALAS:["Fox Sports — Alexi Lalas Power Rankings","T2 — ordinal 1-48","foxsports.com"],
 BR:["Bleacher Report Final 48-Team Power Ranking","T2 — ordinal 1-48","bleacherreport.com"],
 YAH:["Yahoo Sports Power Rankings 1-48","T2 — ordinal 1-48","sports.yahoo.com"],
 SPNET:["Sportsnet World Cup Power Rankings","T2 — ordinal 1-48","sportsnet.ca"],
 ATH:["The Athletic (NYT) — 48 Teams Ranked","T2 — ordinal 1-48","nytimes.com/athletic"],
 ESPN:["ESPN Reporter Panel — Top 15 Favorites","T3 — compare only (top 15 by design)","espn.com"],
 OPTA:["Opta Power Rankings","T3 — compare only (partial public data)","theanalyst.com"],
};
const HILITE = 8; // rank-diff threshold for green/red highlight

// ---- live score overlay (client-side ESPN fetch; CORS-open) ----
const ESPN_ALIAS = {"korea republic":"South Korea","south korea":"South Korea","united states":"United States","usa":"United States","bosnia-herzegovina":"Bosnia and Herzegovina","bosnia and herzegovina":"Bosnia and Herzegovina","turkiye":"Turkey","türkiye":"Turkey","turkey":"Turkey","cote d'ivoire":"Ivory Coast","côte d'ivoire":"Ivory Coast","ivory coast":"Ivory Coast","czech republic":"Czechia","czechia":"Czechia","dr congo":"DR Congo","congo dr":"DR Congo","cabo verde":"Cape Verde","cape verde":"Cape Verde","curaçao":"Curacao","curacao":"Curacao","ir iran":"Iran","iran":"Iran"};
function canon(name){const n=(name||"").trim();if(FLAGS[n])return n;const a=ESPN_ALIAS[n.toLowerCase()];return a||n;}
function pairKey(a,b){return [a,b].sort().join("|");}
// build fixture lookup by unordered team pair
const FX_BY_PAIR={};WCX.fixtures.forEach(f=>{FX_BY_PAIR[pairKey(f.h,f.a)]=f;});
function useLive(){
 const [ov,setOv]=React.useState({});
 React.useEffect(()=>{
  let alive=true;
  const dates=[];const now=new Date();
  for(let i=-1;i<=1;i++){const d=new Date(now);d.setUTCDate(d.getUTCDate()+i);dates.push(""+d.getUTCFullYear()+String(d.getUTCMonth()+1).padStart(2,"0")+String(d.getUTCDate()).padStart(2,"0"));}
  async function pull(){
   try{
    const out={};
    for(const dt of dates){
     const r=await fetch("https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates="+dt);
     if(!r.ok)continue;const j=await r.json();
     (j.events||[]).forEach(ev=>{
      const c=ev.competitions[0],st=c.status.type,cs=c.competitors;
      const hc=cs.find(x=>x.homeAway==="home"),ac=cs.find(x=>x.homeAway==="away");
      if(!hc||!ac)return;
      const h=canon(hc.team.displayName),a=canon(ac.team.displayName);
      const fx=FX_BY_PAIR[pairKey(h,a)];if(!fx)return;
      const hs=hc.score===""||hc.score==null?null:+hc.score, as_=ac.score===""||ac.score==null?null:+ac.score;
      if(st.state==="in"&&hs!=null){
       const al=(fx.h===h);
       out[fx.n]={hs:al?hs:as_,as:al?as_:hs,status:"LIVE",clock:st.shortDetail||st.detail||"LIVE"};
      } else if(st.state==="post"&&hs!=null){
       const al=(fx.h===h);
       out[fx.n]={hs:al?hs:as_,as:al?as_:hs,status:"FT",clock:""};
      }
     });
    }
    if(alive)setOv(out);
   }catch(err){/* CORS or network — silently keep baked data */}
  }
  pull();const id=setInterval(pull,60000);
  return ()=>{alive=false;clearInterval(id);};
 },[]);
 return ov;
}
function mergeLive(f,ov){const o=ov[f.n];return o?Object.assign({},f,o):f;}

// recompute standings + accuracy client-side from baked results + live overlay,
// so the site stays current for visitors even between server refreshes
function computeLive(ov){
 const groups={};WCX.rows.forEach(r=>{groups[r.team]=r.group;});
 const stand={};Object.keys(WCX.standings).forEach(g=>{stand[g]={};WCX.standings[g].forEach(s=>{stand[g][s.team]={team:s.team,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});});
 let correct=0,total=0;
 WCX.fixtures.map(f=>mergeLive(f,ov)).forEach(f=>{
  if(f.status!=="FT"||f.hs==null||f.as==null)return;
  const g=f.g;
  [[f.h,f.hs,f.as],[f.a,f.as,f.hs]].forEach(([t,gf,ga])=>{
   const s=stand[g]&&stand[g][t];if(!s)return;
   s.p++;s.gf+=gf;s.ga+=ga;
   if(gf>ga){s.w++;s.pts+=3;}else if(gf===ga){s.d++;s.pts++;}else s.l++;
  });
  total++;
  if(f.hs===f.as)correct+=Math.abs(f.spread)<0.75?1:0;
  else correct+=((f.spread>0)===(f.hs>f.as))?1:0;
 });
 const out={};Object.keys(stand).forEach(g=>{
  out[g]=Object.values(stand[g]).map(s=>(s.gd=s.gf-s.ga,s)).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
 });
 return {standings:out,accuracy:{correct,total}};
}

function Header({accuracy}){
 const a=accuracy||WCX.accuracy||{correct:0,total:0};
 const pct=a.total?Math.round(100*a.correct/a.total):0;
 return e("div",{className:"hdr"},
  e("div",{className:"logo"},"WORLDCUP",e("span",{className:"x"},"X")),
  e("div",{className:"sub"},"COMPOSITE POWER INDEX"),
  e("div",{className:"kick"},e("span",{className:"pulse"}),"WORLD CUP 2026 · 48 TEAMS · ",WCX.weighted.length," WEIGHTED SYSTEMS · UPDATED ",WCX.computed),
  a.total?e("div",null,e("span",{className:"acc"},"⚽ X-SCORE CALLED ",e("b",null,a.correct+"/"+a.total)," MATCHES (",pct,"%)")):null,
  e("div",{className:"ball"},"⚽"));
}

function Ticker({ov}){
 const done=WCX.fixtures.map(f=>mergeLive(f,ov)).filter(f=>f.status==="FT"||f.status==="LIVE");
 if(!done.length)return null;
 done.sort((a,b)=>(a.status==="LIVE"?-1:b.status==="LIVE"?1:b.n-a.n));
 const item=(f,i)=>e("span",{className:"tk",key:f.n+"-"+i},
  e("span",{className:"flag"},FLAGS[f.h]||""),e("b",null,f.h.split(" ")[0]),
  e("span",{className:"sc"},f.hs+"–"+f.as),
  e("b",null,f.a.split(" ")[0]),e("span",{className:"flag"},FLAGS[f.a]||""),
  f.status==="LIVE"?e("span",{className:"live"},f.clock||"LIVE"):e("span",{className:"ft"},"FT"));
 const seq=done.concat(done); // duplicate for seamless loop
 return e("div",{className:"ticker"},e("div",{className:"ticker-track"},seq.map(item)));
}

function Standings({standings}){
 const st=standings||WCX.standings;
 const order=Object.keys(st).sort();
 return e("div",{className:"gwrap"},order.map((g,gi)=>e("div",{className:"gcard",key:g,style:{"--gc":GROUP_COLORS[g],animationDelay:(gi*0.04)+"s"}},
  e("div",{className:"ghead"},e("span",{className:"gname"},"GROUP "+g)),
  e("table",{className:"stand",style:{width:"100%",borderLeft:"none",fontSize:12}},
   e("thead",null,e("tr",null,["TEAM","P","W","D","L","GD","PTS"].map((h,i)=>e("th",{key:h,style:{textAlign:i?"center":"left",position:"static"}},h)))),
   e("tbody",null,st[g].map((s,i)=>{
    const cls=i<2?"qual":i===2?"qual3":"out";
    return e("tr",{key:s.team},
     e("td",{className:"teamcell "+cls,style:{minWidth:0}},e("span",{className:"flag"},FLAGS[s.team]||""),s.team),
     e("td",null,s.p),e("td",null,s.w),e("td",null,s.d),e("td",null,s.l),
     e("td",{style:{color:s.gd>0?"#00e676":s.gd<0?"#ff4444":"#aab"}},(s.gd>0?"+":"")+s.gd),
     e("td",{className:"xs"},s.pts));
   }))),
  e("div",{style:{fontSize:9,color:"#566",marginTop:8,letterSpacing:.5}},"▎",e("span",{style:{color:"#00e676"}},"top 2 advance")," · ",e("span",{style:{color:"#ffd600"}},"3rd may advance")))));
}

function Pills({sel,setSel}){
 const all=["ALL"].concat(Object.keys(GROUP_COLORS));
 return e("div",{className:"pills"},all.map(g=>{
  const c=g==="ALL"?"#e6edf3":GROUP_COLORS[g];
  const on=sel===g;
  return e("button",{key:g,className:"pill"+(on?" on":""),style:on?{background:c,borderColor:c}:{color:c,borderColor:"#2a3545"},onClick:()=>setSel(g)},g==="ALL"?"ALL":"GRP "+g);
 }));
}

function Rankings(){
 const [sel,setSel]=React.useState("ALL");
 const [key,setKey]=React.useState(false);
 const systems=WCX.weighted.concat(WCX.compare);
 const rows=WCX.rows.filter(r=>sel==="ALL"||r.group===sel);
 return e(React.Fragment,null,
  e(Pills,{sel,setSel}),
  e("div",{style:{textAlign:"center",padding:"8px 0 2px"}},
   e("button",{className:"keybtn",onClick:()=>setKey(true)},"⚽ RATINGS KEY")),
  e("div",{className:"twrap"},
   e("table",null,
    e("thead",null,e("tr",null,
     e("th",{className:"tip"},"X#",e("span",{className:"tiptext"},"Composite X-Score rank")),
     e("th",{className:"tip",style:{textAlign:"left"}},"TEAM",e("span",{className:"tiptext"},"National team")),
     e("th",{className:"tip"},"GRP",e("span",{className:"tiptext"},"World Cup 2026 group")),
     e("th",{className:"tip",style:{color:"#00d4ff",fontWeight:700}},"X-SCORE",e("span",{className:"tiptext"},"Tier-weighted mean of per-system z-scores")),
     e("th",{className:"tip",style:{color:"#00e676"}},"BEST",e("span",{className:"tiptext"},"Best rank across weighted systems")),
     e("th",{className:"tip",style:{color:"#ff4444"}},"WORST",e("span",{className:"tiptext"},"Worst rank across weighted systems")),
     systems.map(s=>{
      const cls=WCX.tier[s]===1?"t1":WCX.tier[s]===2?"t2":"t3";
      return e("th",{key:s,className:"tip "+cls},s,e("span",{className:"tiptext"},SYS_INFO[s][0]+" · "+SYS_INFO[s][1]));
     }))),
    e("tbody",null,rows.map((r,i)=>e("tr",{key:r.team,style:{animationDelay:(i*0.012)+"s"}},
     e("td",{className:"xnum"},r.xr),
     e("td",{className:"teamcell"},e("span",{className:"flag"},FLAGS[r.team]||""),r.team),
     e("td",null,e("span",{className:"grp",style:{background:GROUP_COLORS[r.group]+"33",color:GROUP_COLORS[r.group]}},r.group)),
     e("td",{className:"xs"},r.x.toFixed(3)),
     e("td",{className:"best"},r.best),
     e("td",{className:"worst"},r.worst),
     systems.map(s=>{
      const v=r.ranks[s];
      const cls=WCX.tier[s]===1?"t1":WCX.tier[s]===2?"t2":"t3";
      let hi="";
      if(v!=null&&WCX.tier[s]!==3){
       if(v<=r.xr-HILITE)hi=" hi-g"; else if(v>=r.xr+HILITE)hi=" hi-r";
      }
      return e("td",{key:s,className:cls+hi},v==null?"—":v);
     }))))),
  ),
  key&&e(KeyModal,{close:()=>setKey(false)}));
}

function KeyModal({close}){
 const tiers=[["T1 — MODEL RATINGS (3x weight)","#00d4ff",WCX.weighted.filter(s=>WCX.tier[s]===1)],
  ["T2 — FULL-FIELD MEDIA RANKINGS (1x weight)","#c0885a",WCX.weighted.filter(s=>WCX.tier[s]===2)],
  ["T3 — COMPARE / REFERENCE (unweighted)","#8899aa",WCX.compare]];
 return e("div",{className:"modalbg",onClick:close},
  e("div",{className:"modal",onClick:ev=>ev.stopPropagation()},
   e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:12}},
    e("span",{style:{fontFamily:"Outfit",fontWeight:800,fontSize:16,color:"#ffd600"}},"RATINGS KEY"),
    e("button",{className:"keybtn",onClick:close},"CLOSE")),
   tiers.map(([t,c,list])=>e("div",{key:t,style:{marginBottom:14}},
    e("div",{style:{color:c,fontSize:11,letterSpacing:1,marginBottom:6,fontWeight:700}},t),
    list.map(s=>e("div",{key:s,style:{fontSize:11,padding:"4px 0",borderBottom:"1px solid #151c26"}},
     e("strong",{style:{color:c,display:"inline-block",minWidth:58}},s),
     SYS_INFO[s][0],
     e("span",{style:{color:"#566"}}," · "+SYS_INFO[s][2]))))),
   e("p",{style:{fontSize:10,color:"#8899aa",marginTop:8}},"ATH (The Athletic) pending — will join T2 once its 1-48 list is loaded. ESPN ranks only its top 15 by editorial design; OPTA publishes partial public data. Both shown for comparison, excluded from X-Score.")));
}

function Groups(){
 const byG={};
 WCX.rows.forEach(r=>{(byG[r.group]=byG[r.group]||[]).push(r)});
 const cards=Object.keys(byG).map(g=>({g,teams:byG[g].sort((a,b)=>a.xr-b.xr),avg:byG[g].reduce((s,r)=>s+r.x,0)/4}));
 cards.sort((a,b)=>b.avg-a.avg);
 return e("div",{className:"gwrap"},cards.map((c,i)=>e("div",{className:"gcard",key:c.g,style:{"--gc":GROUP_COLORS[c.g],animationDelay:(i*0.05)+"s"}},
  e("div",{className:"ghead"},
   e("span",{className:"gname"},"GROUP "+c.g,i===0?e("span",{className:"badge"},"TOUGHEST"):null,i===cards.length-1?e("span",{className:"badge",style:{background:"#8899aa"}},"SOFTEST"):null),
   e("span",{className:"gavg"},"avg X "+c.avg.toFixed(2))),
  c.teams.map(t=>e("div",{className:"grow",key:t.team},
   e("span",null,e("span",{className:"flag"},FLAGS[t.team]||""),e("span",{style:{color:"#fff"}},t.team)),
   e("span",null,e("span",{style:{color:"#566",marginRight:8}},"#"+t.xr),e("span",{className:"xs"},t.x.toFixed(2))))))));
}

function Matchups({ov}){
 const [rd,setRd]=React.useState(1);
 const rows={};WCX.rows.forEach(r=>rows[r.team]=r);
 const fx=WCX.fixtures.filter(f=>f.rd===rd).map(f=>mergeLive(f,ov));
 const fmt=d=>{const dt=new Date(d.replace(" ","T"));return dt.toLocaleString(undefined,{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})};
 return e(React.Fragment,null,
  e("div",{className:"pills"},[1,2,3].map(r=>e("button",{key:r,className:"pill"+(rd===r?" on":""),style:rd===r?{background:"#00d4ff",borderColor:"#00d4ff"}:{color:"#00d4ff"},onClick:()=>setRd(r)},"MATCHDAY "+r))),
  e("div",{className:"gwrap"},fx.map((f,i)=>{
   const hr=rows[f.h],ar=rows[f.a];
   const fav=f.spread>=0?f.h:f.a;
   const line=f.spread===0?"PK":(fav===f.h?f.h:f.a)+" -"+Math.abs(f.spread).toFixed(1);
   const live=f.status==="LIVE",ft=f.status==="FT";
   const played=live||ft;
   const tight=Math.abs(f.spread)<=0.5,big=Math.abs(f.spread)>=2;
   // prediction hit/miss on FT
   let hm=null;
   if(ft){
    let ok;
    if(f.hs===f.as)ok=Math.abs(f.spread)<0.75;
    else ok=(f.spread>0)===(f.hs>f.as);
    hm=e("span",{className:"hitmiss "+(ok?"hit":"miss")},ok?"X-SCORE ✓":"UPSET");
   }
   const hWon=played&&f.hs>f.as, aWon=played&&f.as>f.hs;
   return e("div",{className:"gcard",key:f.n,style:{"--gc":GROUP_COLORS[f.g],animationDelay:(i*0.03)+"s"}},
    e("div",{className:"ghead"},
     e("span",{style:{fontSize:10,color:"#8899aa"}},"GRP "+f.g+" · "+(played?"":fmt(f.date))),
     live?e("span",{className:"live-badge"},"● "+(f.clock||"LIVE")):ft?e("span",{className:"ft-badge"},"FULL TIME"):(tight?e("span",{className:"badge",style:{background:"#00e676"}},"TIGHT"):big?e("span",{className:"badge",style:{background:"#ff6b35"}},"MISMATCH"):null)),
    [[f.h,hr,f.hs,hWon],[f.a,ar,f.as,aWon]].map(([t,r,sc,won])=>e("div",{className:"grow",key:t},
     e("span",null,e("span",{className:"flag"},FLAGS[t]||""),e("span",{style:{color:"#fff",fontWeight:500}},t),won?e("span",{className:"winflag"},"▸"):null,e("span",{style:{color:"#566",marginLeft:7,fontSize:10}},"#"+r.xr)),
     played?e("span",{className:"score"},sc):e("span",{className:"xs"},r.x.toFixed(2)))),
    e("div",{style:{marginTop:9}},
     e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:4}},
      e("span",{style:{color:"#00d4ff"}},"X-SPREAD: "+line,hm),
      e("span",{style:{color:"#8899aa"}},f.hwin+"% "+f.h.split(" ")[0])),
     e("div",{style:{height:5,background:"#1c2430",borderRadius:3,overflow:"hidden"}},
      e("div",{style:{width:f.hwin+"%",height:"100%",background:"linear-gradient(90deg,#00d4ff,#00e676)",transition:"width .6s"}}))),
    e("div",{style:{fontSize:9,color:"#566",marginTop:7,letterSpacing:.5}},f.loc.toUpperCase()));
  })));
}

function Futures(){
 const rows={};WCX.rows.forEach(r=>rows[r.team]=r);
 const f=WCX.futures||{};
 const teams=Object.keys(f).sort((a,b)=>f[b].cup-f[a].cup||f[b].ko-f[a].ko);
 const bar=(v,c)=>e("div",{style:{display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end"}},
  e("span",{style:{minWidth:38,textAlign:"right",color:c,fontWeight:700}},v+"%"),
  e("div",{style:{width:54,height:5,background:"#1c2430",borderRadius:3,overflow:"hidden"}},
   e("div",{style:{width:Math.min(100,v)+"%",height:"100%",background:c}})));
 return e(React.Fragment,null,
  e("div",{style:{textAlign:"center",padding:"14px 16px 4px",color:"#8899aa",fontSize:11,letterSpacing:1}},
   "MONTE CARLO · 20,000 SIMULATIONS FROM X-SCORE · CONDITIONED ON RESULTS SO FAR"),
  e("div",{className:"twrap"},
   e("table",null,
    e("thead",null,e("tr",null,
     e("th",null,"X#"),
     e("th",{style:{textAlign:"left"}},"TEAM"),
     e("th",null,"GRP"),
     e("th",{className:"tip",style:{color:"#00e676"}},"WIN GROUP",e("span",{className:"tiptext"},"Probability of finishing 1st in group")),
     e("th",{className:"tip",style:{color:"#00d4ff"}},"REACH KO",e("span",{className:"tiptext"},"Probability of reaching the 32-team knockout round")),
     e("th",{className:"tip",style:{color:"#ffd600"}},"TITLE",e("span",{className:"tiptext"},"Probability of winning the World Cup (pre-bracket estimate)")))),
    e("tbody",null,teams.map((t,i)=>{const r=rows[t],v=f[t];return e("tr",{key:t,style:{animationDelay:(i*0.012)+"s"}},
     e("td",{className:"xnum"},r.xr),
     e("td",{className:"teamcell"},e("span",{className:"flag"},FLAGS[t]||""),t),
     e("td",null,e("span",{className:"grp",style:{background:GROUP_COLORS[r.group]+"33",color:GROUP_COLORS[r.group]}},r.group)),
     e("td",null,bar(v.grp,"#00e676")),
     e("td",null,bar(v.ko,"#00d4ff")),
     e("td",null,bar(v.cup,"#ffd600")));
    })))),
  e("p",{style:{textAlign:"center",color:"#566",fontSize:10,padding:"8px 16px 0",maxWidth:680,margin:"0 auto",lineHeight:1.6}},
   "Group finish simulated via twin-Poisson scorelines from each team's X-Score, banking results already played. Title odds use a seeded knockout approximation — the exact bracket replaces it once the group stage finalizes."));
}

function Methodology(){
 return e("div",{className:"meth"},
  e("h3",null,"01 — WHAT IS X-SCORE?"),
  e("p",null,"The X-Score is a ",e("strong",{style:{color:"#fff"}},"composite power rating")," aggregating ",e("strong",{style:{color:"#fff"}},WCX.weighted.length+" independent ranking systems")," across all 48 teams at the 2026 FIFA World Cup. Instead of trusting any single model or analyst, every system is standardized and combined into one consensus number — the same meta-model methodology behind BracketX (NCAA)."),
  e("h3",null,"02 — Z-SCORE NORMALIZATION"),
  e("p",null,"Systems publishing ",e("strong",{style:{color:"#00d4ff"}},"raw rating values")," (PELE, Elo, FIFA points) are z-scored on those values across the 48-team field — preserving the true gaps between teams, not just their order. Ordinal media rankings are standardized from inverted rank position."),
  e("div",{className:"formula"},"z = (value − field mean) ÷ field standard deviation"),
  e("h3",null,"03 — TIER WEIGHTING"),
  e("p",null,e("strong",{style:{color:"#00d4ff"}},"T1 (3x)"),": numeric model ratings — PELE, Elo, FIFA points. ",e("strong",{style:{color:"#c0885a"}},"T2 (1x)"),": full-field 1-48 media power rankings — Fox (Lalas), Bleacher Report, Yahoo, Sportsnet, The Athletic. ",e("strong",{style:{color:"#8899aa"}},"T3 (0x)"),": partial-coverage systems (ESPN top-15 panel, public Opta data) shown for comparison only."),
  e("div",{className:"formula"},"X-Score = Σ(weight × z) ÷ Σ(weight)"),
  e("h3",null,"04 — DATA INTEGRITY"),
  e("p",null,"All values are real, fetched from sources. Nothing is estimated. Every weighted system covers all 48 teams — no partial coverage is allowed into the composite. The X-Score is the consensus power index from kickoff; results are tracked live against it."),
  e("h3",null,"05 — X-SPREAD & WIN PROBABILITY"),
  e("p",null,"The X-Spread converts the X-Score differential into a projected goal margin, calibrated against opening bookmaker lines and shown to the nearest half-goal. Win probability is a logistic transform of the same differential."),
  e("div",{className:"formula"},"X-Spread = (X-Score A − X-Score B) × 0.9 goals"),
  e("h3",null,"06 — LIVE RESULTS"),
  e("p",null,"Scores update automatically: a scheduled job pulls completed results every few minutes, and the page itself fetches the live in-progress match from ESPN. The accuracy chip tracks how often the X-Score favorite holds up — a non-draw counts as correct when the favored side avoids defeat; near-even matches (spread under ¾ goal) count a draw as correct."),
  e("h3",null,"07 — WHAT'S NEXT"),
  e("p",null,"Knockout bracket simulator and futures/title probabilities ship as the group stage resolves — the full BracketX feature set, adapted for the World Cup."));
}

function App(){
 const [tab,setTab]=React.useState("RANKINGS");
 const ov=useLive();
 const {standings,accuracy}=React.useMemo(()=>computeLive(ov),[ov]);
 const tabs=["RANKINGS","STANDINGS","GROUPS","MATCHUPS","FUTURES","METHODOLOGY"];
 return e(React.Fragment,null,
  e(Header,{accuracy}),
  e(Ticker,{ov}),
  e("div",{className:"tabs"},tabs.map(t=>e("button",{key:t,className:"tab"+(tab===t?" on":""),onClick:()=>setTab(t)},t))),
  tab==="RANKINGS"&&e(Rankings),
  tab==="STANDINGS"&&e(Standings,{standings}),
  tab==="GROUPS"&&e(Groups),
  tab==="MATCHUPS"&&e(Matchups,{ov}),
  tab==="FUTURES"&&e(Futures),
  tab==="METHODOLOGY"&&e(Methodology),
  e("div",{className:"ftr"},
   e("div",{className:"logo"},"WORLDCUP",e("span",{className:"x"},"X")),
   e("div",{className:"who"},"CHRIS DELL: FOUNDER · SIBLING OF ",e("a",{href:"https://bracketx.co"},"BRACKETX.CO"))));
}
ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
